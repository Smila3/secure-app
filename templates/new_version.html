{% extends "base.html" %}
{% block title %}Upload New Version{% endblock %}
{% block content %}
  <h2>Upload New Version</h2>

  <p><strong>Current document:</strong> {{ doc.original_name }}</p>
  <p><strong>Current version:</strong> v{{ doc.latest_version }}</p>

  <form method="POST" enctype="multipart/form-data">
    <label for="document">Choose updated file</label>
    <input type="file" name="document" id="document" required>
    <button type="submit">Upload New Version</button>
  </form>

  <p><a href="{{ url_for('dashboard') }}">Back to dashboard</a></p>
{% endblock %}
